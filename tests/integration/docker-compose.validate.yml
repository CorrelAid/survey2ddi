services:
  schematron-worker:
    image: ghcr.io/correlaid/qwacback-schematron-worker:${QWACBACK_TAG:-latest}
    environment:
      - NATS_URL=nats://qwacback:4222
      - NATS_TOKEN=${NATS_TOKEN:-changeme}
      - SCHEMATRON_PATH=/app/schematron/ddi_custom_rules.sch
      - XSD_PATH=/app/xml/codebook.xsd
    depends_on:
      qwacback:
        condition: service_healthy
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  qwacback:
    image: ghcr.io/correlaid/qwacback:${QWACBACK_TAG:-latest}
    ports:
      - "${PB_PORT:-8090}:8080"
    environment:
      - QWACBACK_SKIP_SEED=1
      - NATS_PORT=4222
      - NATS_TOKEN=${NATS_TOKEN:-changeme}
      - GOMEMLIMIT=${GOMEMLIMIT:-512MiB}
    restart: on-failure
    command: ["./qwacback", "serve", "--http=0.0.0.0:8080"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '1.0'
